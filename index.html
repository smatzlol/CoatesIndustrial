<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coates Industrial Scheduler</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c0:#0a0c12;--c1:#11131d;--c2:#181b28;--c3:#1f2235;--c4:#272b42;--ch:#2f344f;
  --accent:#7161ef;--acch:#8b7df3;--accdim:rgba(113,97,239,.16);
  --green:#22d3a5;--greendim:rgba(34,211,165,.14);
  --amber:#f5a623;--ambdim:rgba(245,166,35,.14);
  --red:#ff5f57;--reddim:rgba(255,95,87,.14);
  --sky:#38b2f8;--skydim:rgba(56,178,248,.14);
  --t0:#eef0f9;--t1:#9ba3c7;--t2:#59607c;
  --bdr:#1f2337;--r:12px;--rs:7px;--shadow:0 18px 54px rgba(0,0,0,.38);
}
html,body{height:100%;background:var(--c0);color:var(--t0);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;font-size:14px}
body{overflow:hidden}
a{color:inherit}
button,input,select,textarea{font:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--c4);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}

#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

.hdr{display:flex;align-items:center;gap:12px;padding:10px 16px;background:rgba(17,19,29,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);flex-shrink:0;z-index:5}
.logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800;letter-spacing:-.3px}
.logo small{font-size:11px;color:var(--t1);font-weight:600;letter-spacing:.2px}
.logo svg{color:var(--accent)}
.yr-nav{display:flex;align-items:center;gap:3px}
.yr-label{font-size:15px;font-weight:700;min-width:52px;text-align:center}
.spacer{flex:1}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tabs{display:flex;gap:3px;background:var(--c2);padding:4px;border-radius:9px;max-width:100%;overflow:auto}
.tab{padding:7px 11px;border:none;background:transparent;color:var(--t1);cursor:pointer;border-radius:7px;white-space:nowrap;display:flex;gap:6px;align-items:center;transition:.15s}
.tab.on{background:var(--c4);color:var(--t0)}
.tab:hover:not(.on){background:var(--c3);color:var(--t0)}
.btn-icon,.btn-ghost,.btn-primary,.btn-soft,.btn-del{
  border:none;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px
}
.btn-icon{width:32px;height:32px;background:transparent;color:var(--t1)}
.btn-icon:hover{background:var(--c3);color:var(--t0)}
.btn-primary{padding:8px 14px;background:var(--accent);color:#fff;font-weight:600}
.btn-primary:hover{background:var(--acch)}
.btn-ghost{padding:7px 12px;background:transparent;border:1px solid var(--bdr);color:var(--t1)}
.btn-ghost:hover,.btn-soft:hover{background:var(--c3);color:var(--t0)}
.btn-soft{padding:7px 12px;background:var(--c2);color:var(--t1)}
.btn-del{padding:7px 12px;background:var(--reddim);color:var(--red);font-weight:600}
.btn-del:hover{background:var(--red);color:#fff}
.btn-full{width:100%;padding:10px 12px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-weight:600}
.btn-full:hover{background:var(--acch)}

.banner{display:flex;gap:10px;align-items:center;padding:10px 16px;background:var(--ambdim);border-bottom:1px solid rgba(245,166,35,.26);color:var(--amber);font-size:12px}
.banner code{background:rgba(245,166,35,.15);padding:2px 5px;border-radius:4px}

.main{display:flex;flex:1;overflow:hidden}
.content{flex:1;overflow:auto;padding:16px}

.top-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.metric{background:var(--c1);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}
.metric .label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--t1);font-weight:700}
.metric .val{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-top:4px}
.metric .sub{font-size:12px;color:var(--t1);margin-top:6px}

.alert-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.alert-card{background:var(--c1);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px}
.alert-card strong{display:block;font-size:22px}
.alert-card small{color:var(--t1);display:block;margin-top:4px}
.alert-card.warn{border-color:rgba(245,166,35,.25);background:linear-gradient(180deg,var(--c1),rgba(245,166,35,.05))}
.alert-card.danger{border-color:rgba(255,95,87,.25);background:linear-gradient(180deg,var(--c1),rgba(255,95,87,.05))}
.alert-card.info{border-color:rgba(56,178,248,.2);background:linear-gradient(180deg,var(--c1),rgba(56,178,248,.05))}
.alert-card.good{border-color:rgba(34,211,165,.2);background:linear-gradient(180deg,var(--c1),rgba(34,211,165,.05))}

.grid-2{display:grid;grid-template-columns:1.3fr .9fr;gap:12px}
.panel{background:var(--c1);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.panel-h{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--bdr)}
.panel-h h3{font-size:14px;font-weight:700}
.panel-b{padding:14px 16px}
.stack{display:flex;flex-direction:column;gap:10px}
.mini-list{display:flex;flex-direction:column;gap:9px}
.row-item{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:11px 12px;border:1px solid var(--bdr);border-radius:10px;background:var(--c2)}
.row-main{min-width:0}
.row-title{font-weight:700;font-size:13px}
.row-sub{font-size:12px;color:var(--t1);margin-top:4px;display:flex;flex-wrap:wrap;gap:10px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700}
.p-scheduled{background:var(--accdim);color:var(--accent)}
.p-approved{background:var(--skydim);color:var(--sky)}
.p-quote{background:rgba(160,174,192,.13);color:#b9bfd6}
.p-on-site,.p-in-progress{background:var(--ambdim);color:var(--amber)}
.p-awaiting-parts{background:rgba(245,166,35,.08);color:#f7c15c}
.p-completed,.p-done{background:var(--greendim);color:var(--green)}
.p-cancelled{background:var(--reddim);color:var(--red)}

.filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.sbox{flex:1;min-width:220px;max-width:340px;position:relative}
.sbox input{width:100%;padding:9px 11px 9px 34px;border-radius:9px;border:1px solid var(--bdr);background:var(--c2);color:var(--t0);outline:none}
.sbox input:focus{border-color:var(--accent)}
.sbox svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t2)}
.fc{width:100%;padding:9px 11px;border-radius:9px;border:1px solid var(--bdr);background:var(--c3);color:var(--t0);outline:none}
.fc:focus{border-color:var(--accent)}
textarea.fc{min-height:72px;resize:vertical}
.fg{display:flex;flex-direction:column;gap:6px}
.fg label{font-size:11px;text-transform:uppercase;letter-spacing:.45px;color:var(--t1);font-weight:700}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.mcard{background:var(--c1);border:1px solid var(--bdr);border-radius:var(--r);padding:13px}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.mname{font-size:12px;font-weight:800}
.mjc{font-size:10px;font-weight:700;border-radius:999px;background:var(--accdim);color:var(--accent);padding:3px 7px}
.wrow,.dgrid{display:grid;grid-template-columns:repeat(7,1fr)}
.wd{text-align:center;font-size:9px;font-weight:800;color:var(--t2);padding:2px 0;margin-bottom:3px;text-transform:uppercase}
.dgrid{gap:1px}
.dc{aspect-ratio:1;min-height:31px;border-radius:6px;padding:3px 2px;display:flex;flex-direction:column;justify-content:space-between;align-items:center;cursor:pointer;position:relative;transition:.12s}
.dc:hover{background:var(--c3)}
.dc.today{background:var(--accdim)}
.dc.sel{background:var(--accent)}
.dc.sel .dn,.dc.sel .day-ct{color:#fff}
.dc.booked:not(.today):not(.sel){background:rgba(113,97,239,.06);border:1px solid rgba(113,97,239,.16)}
.dc.emp{pointer-events:none}
.dn-row{display:flex;align-items:center;gap:3px}
.dn{font-size:11px}
.day-ct{font-size:8px;font-weight:800;color:var(--t1)}
.day-bars{display:flex;gap:1px;width:100%}
.dbar{height:3px;flex:1;border-radius:3px}
.sidebar{width:0;flex-shrink:0;overflow:hidden;transition:width .24s}
.sidebar.open{width:330px;border-left:1px solid var(--bdr)}
.sb-inner{width:330px;height:100%;display:flex;flex-direction:column;background:var(--c1)}
.sb-hdr{padding:14px 16px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:flex-start}
.sb-jobs{padding:12px;overflow:auto;display:flex;flex-direction:column;gap:8px;flex:1}
.sb-foot{padding:12px;border-top:1px solid var(--bdr)}
.jitem{background:var(--c2);border:1px solid var(--bdr);border-radius:10px;padding:10px 11px;cursor:pointer}
.jitem:hover{background:var(--c3)}
.jtop{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.jtitle{font-weight:700;font-size:13px}
.jmeta{font-size:12px;color:var(--t1);display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}

.cgrid,.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.ccard,.asset-card{background:var(--c1);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;cursor:pointer;box-shadow:var(--shadow)}
.ccard:hover,.asset-card:hover{border-color:var(--c4);background:var(--c2)}
.ctop{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.cava{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800}
.cname{font-weight:800}
.cco,.muted{color:var(--t1);font-size:12px}
.cdet{display:flex;flex-direction:column;gap:4px}
.cdrow{font-size:12px;color:var(--t1);display:flex;gap:6px;align-items:center}
.asset-top{display:flex;justify-content:space-between;gap:10px}
.asset-name{font-size:14px;font-weight:800}
.asset-card .meta{display:flex;flex-direction:column;gap:4px;margin-top:10px;font-size:12px;color:var(--t1)}
.tag{display:inline-flex;padding:4px 7px;border-radius:999px;font-size:10px;font-weight:700;background:var(--c3);color:var(--t1)}

.board{display:grid;grid-template-columns:repeat(6,minmax(220px,1fr));gap:12px;align-items:start}
.col{background:var(--c1);border:1px solid var(--bdr);border-radius:var(--r);min-height:220px;display:flex;flex-direction:column}
.col-h{padding:12px 13px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.col-h h4{font-size:12px;text-transform:uppercase;letter-spacing:.45px;color:var(--t1)}
.col-b{padding:12px;display:flex;flex-direction:column;gap:8px;min-height:160px}
.kcard{background:var(--c2);border:1px solid var(--bdr);border-radius:10px;padding:10px;cursor:grab}
.kcard.dragging{opacity:.55}
.kcard:hover{background:var(--c3)}
.kcard .title{font-weight:700;font-size:13px}
.kcard .meta{font-size:12px;color:var(--t1);margin-top:6px;display:flex;flex-direction:column;gap:4px}

.schedule-toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.schedule-grid{background:var(--c1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.sched-head{display:grid;grid-template-columns:72px repeat(7,1fr);border-bottom:1px solid var(--bdr)}
.sched-head div{padding:10px;border-right:1px solid var(--bdr);font-size:12px;font-weight:700}
.sched-body{position:relative;display:grid;grid-template-columns:72px repeat(7,1fr);height:720px}
.hour-labels{grid-column:1/2;display:grid;grid-template-rows:repeat(10,72px);background:var(--c2)}
.hour-label{border-bottom:1px solid var(--bdr);padding:6px 8px;font-size:11px;color:var(--t1)}
.day-col{position:relative;border-right:1px solid var(--bdr);background:
  repeating-linear-gradient(to bottom, transparent 0 71px, rgba(255,255,255,.05) 71px 72px)}
.event{position:absolute;left:6px;right:6px;border-radius:10px;padding:8px 8px 7px;color:#fff;overflow:hidden;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.28)}
.event strong{display:block;font-size:12px;line-height:1.2}
.event small{display:block;opacity:.95;margin-top:4px;font-size:11px;line-height:1.25}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.68);display:flex;align-items:center;justify-content:center;padding:18px;opacity:0;pointer-events:none;transition:.18s;backdrop-filter:blur(6px);z-index:50}
.overlay.on{opacity:1;pointer-events:all}
.modal{width:760px;max-width:calc(100vw - 20px);max-height:calc(100vh - 20px);overflow:hidden;background:var(--c2);border:1px solid var(--bdr);border-radius:15px;box-shadow:0 28px 80px rgba(0,0,0,.55);transform:translateY(12px) scale(.97);transition:.18s}
.overlay.on .modal{transform:translateY(0) scale(1)}
.mhd{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--bdr)}
.mtitle{font-size:15px;font-weight:800}
.mbody{padding:16px;overflow:auto;max-height:calc(100vh - 150px);display:flex;flex-direction:column;gap:14px}
.mft{padding:12px 16px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:8px}
.mft .sp{flex:1}
.help{font-size:12px;color:var(--t1)}
.split{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.section{padding:12px;border:1px solid var(--bdr);border-radius:12px;background:rgba(255,255,255,.015)}
.list-lines{display:flex;flex-direction:column;gap:8px}
.line{padding:9px 10px;border-radius:9px;background:var(--c3);border:1px solid var(--bdr);font-size:12px}
.empty-state{text-align:center;padding:70px 20px;color:var(--t2)}
.color-swatches{display:flex;flex-wrap:wrap;gap:8px}
.cswatch{width:24px;height:24px;border:none;border-radius:50%;cursor:pointer}
.cswatch.active{outline:2px solid #fff;box-shadow:0 0 0 3px rgba(255,255,255,.2)}

.print-sheet{display:none}
@media print{
  body *{visibility:hidden}
  .print-sheet,.print-sheet *{visibility:visible}
  .print-sheet{display:block;position:absolute;inset:0;padding:24px;color:#000;background:#fff;font-family:Arial,sans-serif}
  .print-sheet h1{font-size:24px;margin-bottom:10px}
  .print-sheet h2{font-size:16px;margin:18px 0 6px}
  .print-sheet .box{border:1px solid #222;padding:10px;margin-bottom:10px}
  .print-sheet .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
}
.drive-area{display:flex;align-items:center;gap:6px}
.drive-signin{padding:7px 12px;border:1px solid var(--bdr);background:transparent;color:var(--t1);border-radius:8px;cursor:pointer}
.drive-signin:hover{background:var(--c3);color:var(--t0)}
.drive-status{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--c2);border:1px solid var(--bdr);border-radius:8px;font-size:12px;color:var(--t1)}
.sync-dot{width:8px;height:8px;border-radius:50%}
.sync-dot.ok{background:var(--green)}
.sync-dot.busy{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.32}}

@media(max-width:1200px){
  .month-grid{grid-template-columns:repeat(3,1fr)}
  .top-grid,.alert-strip{grid-template-columns:repeat(2,1fr)}
  .grid-2,.split{grid-template-columns:1fr}
}
@media(max-width:900px){
  .month-grid{grid-template-columns:repeat(2,1fr)}
  .board{grid-template-columns:repeat(2,minmax(230px,1fr))}
  .sched-head,.sched-body{grid-template-columns:56px repeat(7,minmax(140px,1fr));min-width:1040px}
}
@media(max-width:760px){
  .hdr{align-items:flex-start;flex-direction:column}
  .hdr-right{width:100%}
  .tabs{width:100%}
  .month-grid,.top-grid,.alert-strip,.cplay:block;position:absolute;inset:0;padding:24px;color:#000;background:#fff;font-family:Arial,sans-serif}
  .print-sheet h1{font-size:24px;margin-bottom:10px}
  .print-sheet h2{font-size:16px;margin:18px 0 6px}
  .print-sheet .box{border:1px solid #222;padding:10px;margin-bottom:10px}
  .print-sheet .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
}
.drive-area{display:flex;align-items:center;gap:6px}
.drive-signin{padding:7px 12px;border:1px solid var(--bdr);background:transparent;color:var(--t1);border-radius:8px;cursor:pointer}
.drive-signin:hover{background:var(--c3);color:var(--t0)}
.drive-status{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--c2);border:1px solid var(--bdr);border-radius:8px;font-size:12px;color:var(--t1)}
.sync-dot{width:8px;height:8px;border-radius:50%}
.sync-dot.ok{background:var(--green)}
.sync-dot.busy{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.32}}

/* Leads tab */
.leads-board{display:grid;grid-template-columns:320px minmax(0,1fr);gap:18px;align-items:start}
.lead-section{min-width:0}
.lead-section[data-lead-section="templates"]{grid-column:1/-1}
.lead-section[data-lead-section="saved"]{grid-column:1/-1}
.lead-map-standalone{grid-column:2;min-width:0}
.lead-section.dragging{opacity:.58}
.lead-section.drop-target{outline:2px dashed var(--accent);outline-offset:3px}
.lead-section-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.lead-section-heading{display:flex;align-items:flex-start;gap:10px;min-width:0}
.lead-section-title{display:flex;flex-direction:column;gap:2px;min-width:0}
.lead-section-title .muted{font-size:12px}
.lead-section-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.lead-section-handle{display:inline-flex;align-items:center;justify-content:center;min-width:54px;padding:6px 10px;border:1px dashed var(--bdr);border-radius:8px;background:var(--c2);color:var(--t1);font-size:12px;font-weight:700;cursor:grab;user-select:none}
.lead-section-handle:active{cursor:grabbing}
.lead-section.is-collapsed .panel-h{border-bottom:none}
.lead-section-body{min-width:0}
.leads-layout{display:grid;grid-template-columns:320px 1fr;gap:18px;align-items:start}
.leads-side{display:flex;flex-direction:column;gap:14px}
.leads-panel,.leads-map-shell{min-width:0}
.leads-map-wrap{position:relative;min-height:540px}
.leads-map-panel{position:absolute;left:0;top:0;width:100%;height:540px;background:var(--c1);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 18px 34px rgba(15,23,42,.08)}
.leads-map-panel.dragging{box-shadow:0 24px 44px rgba(15,23,42,.16)}
.leads-map-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid var(--bdr);font-size:13px;cursor:grab;user-select:none;touch-action:none}
.leads-map-head:active{cursor:grabbing}
.leads-map-toolbar{display:flex;align-items:center;gap:8px;flex-shrink:0}
.leads-map-hint{font-size:11px;color:var(--t2);white-space:nowrap}
.leads-map{flex:1;min-height:280px;width:100%}
.leads-map-resize{position:absolute;right:8px;bottom:8px;width:18px;height:18px;border:none;background:transparent;cursor:nwse-resize;color:var(--t2);padding:0;touch-action:none}
.leads-map-resize::before{content:'';position:absolute;right:2px;bottom:2px;width:12px;height:12px;background:linear-gradient(135deg,transparent 0 44%,currentColor 44% 54%,transparent 54% 64%,currentColor 64% 74%,transparent 74% 84%,currentColor 84% 94%,transparent 94%);opacity:.9}
.lead-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lead-chipbar{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.lead-chip{padding:4px 10px;border-radius:20px;border:1px solid var(--bdr);background:var(--c2);color:var(--t1);font-size:12px;cursor:pointer}
.lead-chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.map-note{font-size:12px;color:var(--t2)}
.lead-result{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid var(--bdr)}

function addRecurrence(date, rule){
  if(!rule || rule==='none') return null;
  const d=parseDate(date);
  if(rule==='weekly') d.setDate(d.getDate()+7);
  if(rule==='monthly') d.setMonth(d.getMonth()+1);
  if(rule==='quarterly') d.setMonth(d.getMonth()+3);
  if(rule==='annual') d.setFullYear(d.getFullYear()+1);
  return d.toISOString().slice(0,10);
}

function monthCells(year,month){
  const first=new Date(year,month,1).getDay();
  const offset=first===0?6:first-1;
  const total=new Date(year,month+1,0).getDate();
  const cells=Array(offset).fill(null);
  for(let d=1; d<=total; d++) cells.push(d);
  while(cells.length%7) cells.push(null);
  return cells;
}

function loadLeadSectionLayout(){

    const order=(Array.isArray(parsed.order)?parsed.order:[]).filter(id=>DEFAULT_LEAD_SECTION_LAYOUT.order.includes(id));

function normalizeLeadMapLayout(layout,wrapWidth){
  const widthLimit=Math.max(320,Math.round(wrapWidth||DEFAULT_LEAD_MAP_LAYOUT.width));
  const minWidth=Math.min(360,widthLimit);
  const width=clamp(Math.round(layout?.width||DEFAULT_LEAD_MAP_LAYOUT.width),minWidth,widthLimit);
  const height=clamp(Math.round(layout?.height||DEFAULT_LEAD_MAP_LAYOUT.height),320,960);
  const x=clamp(Math.round(layout?.x||0),0,Math.max(0,widthLimit-width));
  const y=clamp(Math.round(layout?.y||0),0,640);
  return {x,y,width,height};
}

function maybeGenerateRecurringFollowUp(job, prev){
  if(!job.recurrence || job.recurrence==='none') return;
  const nextDate=addRecurrence(job.date, job.recurrence);
  if(!nextDate) return;
  const exists=DB.jobs.some(j=>
    (j.recurrenceGeneratedFrom===job.id || (prev && j.recurrenceGeneratedFrom===prev.id)) &&
    j.date===nextDate
  );
  if(exists) return;
  DB.jobs.push({
    ...job,
    id:uid(),
    createdAt:Date.now(),
    date:nextDate,
    status:'scheduled',
    description:job.description||'',
    recurrenceGeneratedFrom:job.id,
    recurrenceLastGeneratedAt:Date.now(),
    notesFromPreviousJob:`Auto-generated from completed recurring job on ${job.date}.`,
  });
}

let _gapiReady=false,_gisReady=false,_tokenClient=null,_driveFileId=null,_saveTimer=null;
function gapiLoaded(){
  gapi.load('client', async ()=>{
    await gapi.client.init({ discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest','https://www.googleapis.com/discovery/v1/apis/people/v1/rest'] });
    _gapiReady=true; _driveCheckReady();
  });
}
function gisLoaded(){
  if(GOOGLE_CLIENT_ID.startsWith('YOUR_CLIENT_ID')){ S.driveReady=false; return; }
  _tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID,
    scope:GOOGLE_SCOPES,
    callback:_handleToken
  });
  _gisReady=true; _driveCheckReady();
}
function _driveCheckReady(){ if(_gapiReady && _gisReady){ S.driveReady=true; render(); } }
async function _handleToken(resp){
  if(resp.error){ S.driveError='Sign-in failed'; render(); return; }
  S.driveSignedIn=true; S.driveSyncing=true; S.driveError=null; render();
  await driveLoad(); S.driveSyncing=false; render();
}
function driveSignIn(){ _tokenClient.requestAccessToken({ prompt:gapi.client.getToken()?'':'consent' }); }
function driveSignOut(){
  const t=gapi.client.getToken();
  if(t){ google.accounts.oauth2.revoke(t.access_token, ()=>{}); gapi.client.setToken(''); }
  S.driveSignedIn=false; S.driveError=null; _driveFileId=null; render();
}
async function driveLoad(){
  try{
    const cachedId=localStorage.getItem('sch1_fid'); let fileId=cachedId;
    if(fileId){
      try{
        const r=await gapi.client.drive.files.get({ fileId, alt:'media' });
        _applyDriveData(r.body); _driveFileId=fileId; return;
      }catch(e){ localStorage.removeItem('sch1_fid'); fileId=null; }
    }
    const list=await gapi.client.drive.files.list({ q:`name='${DRIVE_FILE}' and trashed=false`, fields:'files(id)', spaces:'drive', pageSize:1 });
    if(list.result.files.length){
      _driveFileId=list.result.files[0].id;
      localStorage.setItem('sch1_fid',_driveFileId);
      const r=await gapi.client.drive.files.get({ fileId:_driveFileId, alt:'media' });
      _applyDriveData(r.body);
    }else{
      await _driveWrite(JSON.stringify({customers:DB.customers,jobs:DB.jobs,assets:DB.assets,leads:DB.leads,leadEmailTemplates:DB.leadEmailTemplates}));
    }
  }catch(e){ S.driveError='Load failed'; }
}
function _applyDriveData(body){
  try{
    const d=JSON.parse(body);
    DB.customers=d.customers||[];
    DB.jobs=d.jobs||[];
    DB.assets=d.assets||[];
    DB.leads=d.leads||[];
    DB.leadEmailTemplates=normalizeLeadEmailTemplates(d.leadEmailTemplates);
    localStorage.setItem('sch1',body);
    render();
  }catch(e){}
}
async function _driveWrite(content){
  const boundary='sch_bnd';
  const meta=JSON.stringify({name:DRIVE_FILE,mimeType:'application/json'});
  const body=`--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${boundary}--`;
  if(_driveFileId){
    await gapi.client.request({ path:`/upload/drive/v3/files/${_driveFileId}`, method:'PATCH', params:{uploadType:'media'}, headers:{'Content-Type':'application/json'}, body:content });
  }else{
    const r=await gapi.client.request({ path:'/upload/drive/v3/files', method:'POST', params:{uploadType:'multipart'}, headers:{'Content-Type':`multipart/related; boundary="${boundary}"`}, body });
    _driveFileId=r.result.id; localStorage.setItem('sch1_fid',_driveFileId);
  }
}
function driveSaveDebounced(payload){
  if(!S.driveSignedIn) return;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{
    S.driveSyncing=true; render();
    try{ await _driveWrite(payload); S.driveError=null; }catch(e){ S.driveError='Save failed'; }
    S.driveSyncing=false; render();
  }, 1200);
}

function contactApiEnabled(){ return !GOOGLE_CLIENT_ID.startsWith('YOUR_CLIENT_ID'); }
function customerDataFromGoogleContact(contact){
  return {
    name:contact.displayName||'',
    company:contact.company||'',
    phone:contact.phone||'',
    email:contact.email||'',
    address:contact.address||''
  };
}
function normalizeGoogleContact(person){
  const getPrimary=(arr,key)=>Array.isArray(arr)&&arr.length?(arr.find(x=>x.metadata?.primary)||arr[0])?.[key]||'':'';
  return {
    resourceName:person.resourceName,
    etag:person.etag||'',
    metadataSources:Array.isArray(person.metadata?.sources)?person.metadata.sources:[],
    displayName:getPrimary(person.names,'displayName'),
    phone:getPrimary(person.phoneNumbers,'value'),
    email:getPrimary(person.emailAddresses,'value'),
    company:getPrimary(person.organizations,'name'),
    title:getPrimary(person.organizations,'title'),
    address:getPrimary(person.addresses,'formattedValue') || ''
  };
}
function buildGooglePersonFromCustomer(customer,metaSources=[]){
  const person={
    names:[{displayName:customer.name||'',givenName:customer.name||''}],
    organizations:customer.company?[{name:customer.company}]:[],
    phoneNumbers:customer.phone?[{value:customer.phone}]:[],
    emailAddresses:customer.email?[{value:customer.email}]:[],
    addresses:customer.address?[{formattedValue:customer.address}]:[]
  };
  if(customer.notes) person.biographies=[{value:customer.notes}];
  if(Array.isArray(metaSources) && metaSources.length) person.metadata={sources:metaSources};
  return person;
}
async function getGoogleContactForUpdate(resourceName){
  const token=gapi.client.getToken()?.access_token;
  if(!token) throw new Error('Google sign-in token not found');
  const url=new URL(`https://people.googleapis.com/v1/${resourceName}`);
  url.searchParams.set('personFields','names,emailAddresses,phoneNumbers,organizations,addresses,biographies,metadata');
  const resp=await fetch(url.toString(),{headers:{Authorization:`Bearer ${token}`}});
  if(!resp.ok) throw new Error('Could not load latest Google contact');
  return await resp.json();
}
async function updateGoogleContactFromCustomer(customerId){
  const customer=DB.getCustomer(customerId);
  if(!customer?.googleContactId || !contactApiEnabled() || !S.driveSignedIn) return true;
  const token=gapi.client.getToken()?.access_token;
  if(!token) throw new Error('Google sign-in token not found. Please sign in again.');

  const latest=await getGoogleContactForUpdate(customer.googleContactId);
  const payload=buildGooglePersonFromCustomer(customer, latest.metadata?.sources || []);
  payload.resourceName=customer.googleContactId;
  const url=new URL(`https://people.googleapis.com/v1/${customer.googleContactId}:updateContact`);
  url.searchParams.set('updatePersonFields','names,emailAddresses,phoneNumbers,organizations,addresses,biographies');
  url.searchParams.set('personFields','names,emailAddresses,phoneNumbers,organizations,addresses,biographies,metadata');

  const resp=await fetch(url.toString(),{
    method:'PATCH',
    headers:{
      'Authorization':`Bearer ${token}`,
      'Content-Type':'application/json'
    },
    body:JSON.stringify(payload)
  });
  if(!resp.ok){
    const txt=await resp.text();
    console.error(txt);
    throw new Error('Update contact failed');
  }
  const updated=normalizeGoogleContact(await resp.json());
  DB.updateCustomer(customerId,{
    googleContactId:updated.resourceName,
    googleContactName:updated.displayName || customer.name,
    googleContactSyncedAt:Date.now()
  });
  S.googleContactsLoaded=false;
  return true;
}
async function fetchGoogleContacts(){
  const token=gapi.client.getToken()?.access_token;
  if(!token) throw new Error('No Google token');
  let out=[]; let pageToken='';
  for(let i=0;i<5;i++){
    const url=new URL('https://people.googleapis.com/v1/people/me/connections');
    url.searchParams.set('personFields','names,emailAddresses,phoneNumbers,organizations,addresses');
    url.searchParams.set('pageSize','200');
    url.searchParams.set('sortOrder','LAST_MODIFIED_DESCENDING');
    if(pageToken) url.searchParams.set('pageToken',pageToken);
    const resp=await fetch(url.toString(),{headers:{Authorization:`Bearer ${token}`}});
    if(!resp.ok) throw new Error('Contacts request failed');
    const data=await resp.json();
    out=out.concat((data.connections||[]).map(normalizeGoogleContact).filter(c=>c.resourceName && c.displayName));
    pageToken=data.nextPageToken||'';
    if(!pageToken) break;
  }
  const seen=new Set();
  return out.filter(c=>{ if(seen.has(c.resourceName)) return false; seen.add(c.resourceName); return true; });
}
async function ensureGoogleContactsLoaded(force=false){
  if(!S.driveSignedIn){ S.googleContactsError='Sign in with Google first'; return; }
  if(S.googleContactsLoaded && !force) return;
  S.googleContactsLoading=true; S.googleContactsError=null; render();
  try{
    S.googleContacts=await fetchGoogleContacts();

  }catch(e){

    S.googleContactsError='Could not load Google Contacts';

}

async function createGoogleContactFromCustomer(customerId){
  const customer=DB.getCustomer(customerId);
  if(!customer){ return; }
  if(customer.googleContactId){ alert('This customer is already linked to a Google contact.'); return; }
  if(!contactApiEnabled()) { alert('Add your Google Client ID first to use Google Contacts.'); return; }
  if(!S.driveSignedIn){ driveSignIn(); return; }
  const token=gapi.client.getToken()?.access_token;
  if(!token){ alert('Google sign-in token not found. Please sign in again.'); return; }

  const payload={};
  if(customer.name) payload.names=[{displayName:customer.name, givenName:customer.name}];
  if(customer.company) payload.organizations=[{name:customer.company}];
  if(customer.phone) payload.phoneNumbers=[{value:customer.phone}];
  if(customer.email) payload.emailAddresses=[{value:customer.email}];
  if(customer.address) payload.addresses=[{formattedValue:customer.address}];
  if(customer.notes) payload.biographies=[{value:customer.notes}];

  try{
    const url='https://people.googleapis.com/v1/people:createContact?personFields=names,emailAddresses,phoneNumbers,organizations,addresses';
    const resp=await fetch(url,{
      method:'POST',
      headers:{
        'Authorization':`Bearer ${token}`,
        'Content-Type':'application/json'
      },
      body:JSON.stringify(payload)
    });
    if(!resp.ok){
      const txt=await resp.text();
      console.error(txt);
      throw new Error('Create contact failed');
    }
    const created=normalizeGoogleContact(await resp.json());
    DB.updateCustomer(customerId,{
      googleContactId:created.resourceName,
      googleContactName:created.displayName || customer.name,
      googleContactSyncedAt:Date.now()
    });
    S.googleContactsLoaded=false;
    await ensureGoogleContactsLoaded(true);
    S.editCustId=customerId; S.custModal=true; render();
    alert('Google contact created');
  }catch(e){
    console.error(e);
    alert('Failed to create Google contact. Check your OAuth scope is set to https://www.googleapis.com/auth/contacts and sign in again.');
  }
}

function computeAlerts(){
  const today=todayStr();
  const overdueJobs=DB.jobs.filter(j=>j.status!=='completed' && j.status!=='cancelled' && j.date<today).length;
  const upcomingJobs=DB.jobs.filter(j=>j.date>=today && daysBetween(j.date,today)<=7 && j.status!=='completed' && j.status!=='cancelled').length;
  const quoteStale=DB.jobs.filter(j=>j.status==='quote' && daysBetween(today,j.date)>=7).length;
  const overdueAssets=DB.assets.filter(a=>a.nextServiceDue && a.nextServiceDue<today).length;
  const completedNotInvoiced=DB.jobs.filter(j=>j.status==='completed' && !j.invoiceStatus).length;
  const outstandingInvoices=DB.jobs.filter(j=>j.invoiceStatus && j.invoiceStatus!=='paid').length;
  return {overdueJobs,upcomingJobs,quoteStale,overdueAssets,completedNotInvoiced,outstandingInvoices};
}
function dashboardMetrics(){
  const today=todayStr();
  const todayJobs=DB.jobs.filter(j=>j.date===today && j.status!=='cancelled').length;
  const thisWeekStart=startOfWeek(new Date());
  const thisWeekEnd=new Date(thisWeekStart); thisWeekEnd.setDate(thisWeekEnd.getDate()+6);
  const weekJobs=DB.jobs.filter(j=>{
    const d=new Date(j.date);
    return d>=thisWeekStart && d<=thisWeekEnd && j.status!=='cancelled';
  }).length;
  const pipeline=DB.jobs.filter(j=>['quote','approved','scheduled','on-site','awaiting-parts'].includes(j.status))
    .reduce((sum,j)=>sum+Number(j.totalCost||0),0);
  const overdue=computeAlerts();
  return {todayJobs,weekJobs,pipeline,customerCount:DB.customers.length, assetCount:DB.assets.length, overdue};
}
function topUpcoming(limit=6){
  return [...DB.jobs]
    .filter(j=>j.status!=='cancelled' && j.status!=='completed')
    .sort((a,b)=>(a.date+a.startTime).localeCompare(b.date+b.startTime))
    .slice(0,limit);
}
function overdueAssetsList(limit=6){

function queueLeadMapInvalidate(){
  if(!leadMap || leadMapInvalidateQueued) return;
  leadMapInvalidateQueued=true;
  requestAnimationFrame(()=>{
    leadMapInvalidateQueued=false;
    if(leadMap) leadMap.invalidateSize();
  });

}
async function searchLeads(){
  S.leadSearchError=null;
  if(!GOOGLE_PLACES_API_KEY){ S.leadSearchError='Add a Places API key to GOOGLE_PLACES_API_KEY to run live lead searches.'; S.leadResults=[]; render(); return; }
  const region=LEAD_REGIONS[S.leadsRegion] || LEAD_REGIONS['north-east'];
  S.leadSearching=true; S.leadSavedSearch=buildLeadTextQuery(); render();
  const centers=region.centers||[region.center];
  const query=buildLeadTextQuery();
  const headers={'Content-Type':'application/json','X-Goog-Api-Key':GOOGLE_PLACES_API_KEY,'X-Goog-FieldMask':'places.id,places.displayName,places.formattedAddress,places.websiteUri,places.nationalPhoneNumber,places.location,places.businessStatus,places.types,places.googleMapsUri'};
  try{
    const responses=await Promise.all(centers.map(c=>
      fetch('https://places.googleapis.com/v1/places:searchText',{
        method:'POST', headers,
        body:JSON.stringify({textQuery:query,maxResultCount:20,locationBias:{circle:{center:{latitude:c[0],longitude:c[1]},radius:region.radius}}})
      }).then(async res=>{
        if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(`Search failed (${res.status}): ${e?.error?.message||'see console'}`); }
        return res.json();
      })
    ));
    const seen=new Set(); const places=[];
    for(const data of responses){
      for(const p of (data.places||[])){
        const id=p.id||'';
        if(id && seen.has(id)) continue;
        if(id) seen.add(id);
        places.push({placeId:id,name:p.displayName?.text||'Unnamed business',address:p.formattedAddress||'',website:p.websiteUri||'',phone:p.nationalPhoneNumber||'',lat:p.location?.latitude||null,lng:p.location?.longitude||null,status:p.businessStatus||'',types:p.types||[],mapsUri:p.googleMapsUri||'',sector:S.leadsSector,region:S.leadsRegion});
      }
    }
    S.leadResults=places;
    if(!places.length) S.leadSearchError='No businesses found for that sector and region.';
  }catch(err){
    console.error(err);
    S.leadSearchError=err.message || 'Lead search failed';
    S.leadResults=[];
  }
  S.leadSearching=false; render();
}
function saveLeadFromResult(idx){
  const lead=S.leadResults[idx]; if(!lead) return;
  const exists=DB.leads.some(l=>l.placeId && lead.placeId && l.placeId===lead.placeId);
  if(exists){ alert('That lead is already saved.'); return; }
  DB.addLead(lead); render();
}
function convertLeadToCustomer(id){
  const lead=DB.leads.find(l=>l.id===id); if(!lead) return;
  const customer=DB.addCustomer({
    name:lead.name, company:'', phone:lead.phone||'', email:'', address:lead.address||'', notes:`Lead added from ${lead.source||'lead search'} on ${new Date().toLocaleDateString('en-GB')}.\nWebsite: ${lead.website||''}\nSector: ${lead.sector||''}`, color:nextCustColor()
  });
  DB.updateLead(id,{status:'customer',customerId:customer.id});
  S.view='customers'; S.editCustId=customer.id; S.custModal=true; render();
}

function clearLeadSectionTargets(){
  document.querySelectorAll('[data-lead-section]').forEach(section=>section.classList.remove('drop-target','dragging'));

function moveLeadSection(sourceId,targetId){
  if(!sourceId || !targetId || sourceId===targetId) return;
  const order=[...(S.leadSectionLayout?.order || DEFAULT_LEAD_SECTION_LAYOUT.order)];
  const sourceIndex=order.indexOf(sourceId);
  const targetIndex=order.indexOf(targetId);
  if(sourceIndex<0 || targetIndex<0) return;
  order.splice(sourceIndex,1);
  order.splice(targetIndex,0,sourceId);
  S.leadSectionLayout={order,collapsed:{...DEFAULT_LEAD_SECTION_LAYOUT.collapsed,...(S.leadSectionLayout?.collapsed||{})}};
  saveLeadSectionLayout();
  render();
}
function bindLeadSections(){
  document.querySelectorAll('[data-lead-section-handle]').forEach(handle=>{
    handle.addEventListener('dragstart',e=>{
      const section=handle.closest('[data-lead-section]');
      leadSectionDragId=section?.dataset.leadSection || null;
      if(!leadSectionDragId) return;
      if(e.dataTransfer){
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setData('text/plain',leadSectionDragId);
      }
      section?.classList.add('dragging');
    });
    handle.addEventListener('dragend',()=>{
      leadSectionDragId=null;
      clearLeadSectionTargets();
    });
  });
  document.querySelectorAll('[data-lead-section]').forEach(section=>{
    section.addEventListener('dragover',e=>{
      if(!leadSectionDragId || section.dataset.leadSection===leadSectionDragId) return;
      e.preventDefault();
      section.classList.add('drop-target');
    });
    section.addEventListener('dragleave',()=>section.classList.remove('drop-target'));
    section.addEventListener('drop',e=>{
      if(!leadSectionDragId) return;
      e.preventDefault();
      const targetId=section.dataset.leadSection;
      clearLeadSectionTargets();
      moveLeadSection(leadSectionDragId,targetId);
      leadSectionDragId=null;
    });
  });
}

}
function updateLeadMapPointer(ev){
  if(!leadMapPointerState) return;
  const dx=ev.clientX-leadMapPointerState.startX;
  const dy=ev.clientY-leadMapPointerState.startY;
  let next={...leadMapPointerState.startLayout};
  if(leadMapPointerState.mode==='move'){
    next.x=leadMapPointerState.startLayout.x+dx;
    next.y=leadMapPointerState.startLayout.y+dy;
  }else{
    next.width=leadMapPointerState.startLayout.width+dx;
    next.height=leadMapPointerState.startLayout.height+dy;
  }
  S.leadMapLayout=normalizeLeadMapLayout(next,leadMapPointerState.wrap.clientWidth);
  applyLeadMapLayout(false);
}
function startLeadMapPointer(mode,ev){
  if(leadMapUsesCompactLayout()) return;
  if(typeof ev.button==='number' && ev.button!==0) return;
  const wrap=document.getElementById('leadsMapWrap');
  const panel=document.getElementById('leadsMapPanel');
  if(!wrap || !panel) return;
  ev.preventDefault();
  leadMapPointerState={mode,startX:ev.clientX,startY:ev.clientY,startLayout:{...normalizeLeadMapLayout(S.leadMapLayout,wrap.clientWidth)},wrap};
  panel.classList.add('dragging');
  document.body.style.userSelect='none';
}

async function sendViaGmail(toEmail, subject, body){
  const token=gapi.client.getToken()?.access_token;
  if(!token){ alert('Please sign in with Google first.'); return false; }
  if(!toEmail){ alert('This lead has no email address.'); return false; }
  const from='me';
  const raw=[
    `To: ${toEmail}`,
    `Subject: ${subject}`,
    'Content-Type: text/plain; charset=utf-8',
    'MIME-Version: 1.0',
    '',
    body
  ].join('\r\n');
  const encoded=btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  try{
    const resp=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send',{
      method:'POST',
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({raw:encoded})
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      alert('Gmail send failed: '+(err?.error?.message||resp.status));
      return false;
    }
    return true;
  } catch(e){
    alert('Gmail send error: '+e.message);
    return false;
  }
}

function renderSchedule(){

function saveJob(){
  const title=document.getElementById('f-title')?.value.trim();
  const date=document.getElementById('f-date')?.value;
  if(!title){ document.getElementById('f-title').focus(); return; }
  if(!date){ document.getElementById('f-date').focus(); return; }
  const assetSel=document.getElementById('f-assets');
  const assetIds=assetSel?[...assetSel.selectedOptions].map(o=>o.value):[];
  const data={
    title,date,
    status:document.getElementById('f-status')?.value||'scheduled',
    customerId:document.getElementById('f-cust')?.value||null,
    startTime:document.getElementById('f-start')?.value||'',
    endTime:document.getElementById('f-end')?.value||'',
    recurrence:document.getElementById('f-recur')?.value||'none',
    location:document.getElementById('f-loc')?.value.trim()||'',
    description:document.getElementById('f-notes')?.value.trim()||'',
    labourHours:document.getElementById('f-hours')?.value||'',
    labourCost:document.getElementById('f-labourcost')?.value||'',
    partsCost:document.getElementById('f-partscost')?.value||'',
    totalCost:document.getElementById('f-totalcost')?.value||'',
    invoiceStatus:document.getElementById('f-invoice')?.value||'',
    assetIds
  };
  if(S.editJobId) DB.updateJob(S.editJobId,data); else DB.addJob(data);
  S.jobModal=false; S.editJobId=null; S.selDate=date; S.year=Number(date.slice(0,4)); render();
}
async function saveCust(){
  const name=document.getElementById('c-name')?.value.trim();
  if(!name){ document.getElementById('c-name').focus(); return; }
  const data={
    name,
    company:document.getElementById('c-company')?.value.trim()||'',
    phone:document.getElementById('c-phone')?.value.trim()||'',
    email:document.getElementById('c-email')?.value.trim()||'',
    address:document.getElementById('c-address')?.value.trim()||'',
    notes:document.getElementById('c-notes')?.value.trim()||'',
    color:document.getElementById('c-color')?.value||nextCustColor()
  };
  let customerId=S.editCustId;
  if(customerId) DB.updateCustomer(customerId,data); else customerId=DB.addCustomer(data).id;

  try{
    const customer=DB.getCustomer(customerId);
    if(customer?.googleContactId) await updateGoogleContactFromCustomer(customerId);
  }catch(e){
    console.error(e);
    alert('Customer saved in the app, but Google Contacts update failed. Sign out and back in if permissions changed, then try again.');
  }

  S.custModal=false; S.editCustId=null; render();
}

  S.assetModal=false; S.editAssetId=null; render();
}
function closeModal(){ S.jobModal=false; S.custModal=false; S.assetModal=false; S.contactsModal=false; S.editJobId=null; S.editCustId=null; S.editAssetId=null; render(); }

function printJobSheet(jobId){
  const j=DB.jobs.find(x=>x.id===jobId || x.id===S.editJobId);
  if(!j) return;
  const c=DB.getCustomer(j.customerId);
  const assets=(j.assetIds||[]).map(id=>DB.getAsset(id)).filter(Boolean);
  const el=document.getElementById('printSheet');
  el.innerHTML=`
    <h1>Job Sheet</h1>
    <div class="box"><strong>${esc(j.title)}</strong><br>${longDate(j.date)}${j.startTime?` · ${esc(j.startTime)}${j.endTime?`-${esc(j.endTime)}`:''}`:''}<br>Status: ${esc(statusLabel(j.status))}</div>
    <div class="grid">
      <div class="box"><h2>Customer</h2>${esc(c?.name||'')}<br>${esc(c?.company||'')}<br>${esc(c?.phone||'')}<br>${esc(c?.email||'')}</div>
      <div class="box"><h2>Site</h2>${esc(j.location||c?.address||'')}</div>
    </div>
    <div class="box"><h2>Work description</h2>${esc(j.description||'').replace(/\n/g,'<br>')}</div>
    <div class="grid">
      <div class="box"><h2>Assets</h2>${assets.length?assets.map(a=>`${esc(a.name||a.makeModel||'Asset')} ${a.serial?`(S/N ${esc(a.serial)})`:''}`).join('<br>'):'None linked'}</div>
      <div class="box"><h2>Costs</h2>Labour hours: ${esc(j.labourHours||'')}<br>Labour cost: ${esc(fmtMoney(j.labourCost||0))}<br>Parts cost: ${esc(fmtMoney(j.partsCost||0))}<br>Total: ${esc(fmtMoney(j.totalCost||0))}</div>
    </div>
    <div class="box" style="height:90px"><h2>Engineer signature</h2></div>
  `;
  window.print();
}

document.addEventListener('click',e=>{
  if(e.target.classList.contains('overlay')){ closeModal(); return; }
  const dc=e.target.closest('.dc:not(.emp)');
  if(dc && S.view==='calendar' && !S.jobModal && !S.custModal && !S.assetModal){ S.selDate=dc.dataset.date; render(); return; }
  const el=e.target.closest('[data-a]');
  if(!el) return;
  switch(el.dataset.a){
    case 'view': S.view=el.dataset.view; if(S.view==='calendar' && !S.selDate) S.selDate=todayStr(); render(); break;
    case 'yprev': S.year--; render(); break;
    case 'ynext': S.year++; render(); break;
    case 'todayyear': S.year=todayObj().getFullYear(); render(); break;
    case 'closesb': S.selDate=null; render(); break;
    case 'addjob': S.jobModal=true; S.editJobId=null; S.preDate=S.selDate||todayStr(); render(); break;
    case 'addjobdate': S.jobModal=true; S.editJobId=null; S.preDate=el.dataset.date; render(); break;
    case 'editjob': S.jobModal=true; S.editJobId=el.dataset.jid; render(); break;
    case 'savejob': saveJob(); break;
    case 'deljob': if(confirm('Delete this job?')){ DB.deleteJob(S.editJobId); closeModal(); } break;
    case 'addcust': S.custModal=true; S.editCustId=null; S.contactsModal=false; render(); break;
    case 'editcust': S.custModal=true; S.editCustId=el.dataset.cid; S.contactsModal=false; render(); break;
    case 'importgoogle': openContactPicker('import'); break;
    case 'linkgoogle': openContactPicker('link', S.editCustId); break;
    case 'refreshgoogle': refreshCustomerFromGoogle(S.editCustId); break;
    case 'creategoogle': createGoogleContactFromCustomer(S.editCustId); break;
    case 'reloadcontacts': ensureGoogleContactsLoaded(true); break;
    case 'pickcontact':
      if(S.contactPickerMode==='link') linkGoogleContactToCustomer(S.contactPickerTargetCustomerId, el.dataset.resource);
      else importGoogleContact(el.dataset.resource);
      break;
    case 'closecontacts':
      S.contactsModal=false;
      if(S.contactPickerMode==='link' && S.contactPickerTargetCustomerId){ S.custModal=true; S.editCustId=S.contactPickerTargetCustomerId; }
      render();
      break;
    case 'savecust': saveCust(); break;
    case 'delcust': if(confirm('Delete this customer? Jobs and assets will remain but become unassigned.')){ DB.deleteCustomer(S.editCustId); closeModal(); } break;
    case 'addasset': S.assetModal=true; S.editAssetId=null; render(); break;
    case 'editasset': S.assetModal=true; S.editAssetId=el.dataset.aid; render(); break;
    case 'saveasset': saveAsset(); break;
    case 'delasset': if(confirm('Delete this asset?')){ DB.deleteAsset(S.editAssetId); closeModal(); } break;
    case 'closemod': closeModal(); break;
    case 'setcolor':
      document.querySelectorAll('.cswatch').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      const inp=document.getElementById('c-color'); if(inp) inp.value=el.dataset.color;
      break;
    case 'schedprev':
      S.scheduleDate=addDays(S.scheduleDate,S.scheduleMode==='week'?-7:-1); render(); break;
    case 'schednext':
      S.scheduleDate=addDays(S.scheduleDate,S.scheduleMode==='week'?7:1); render(); break;
    case 'schedtoday':
      S.scheduleDate=todayStr(); render(); break;
    case 'drivesignin': driveSignIn(); break;
    case 'drivesignout': driveSignOut(); break;
    case 'printjob': printJobSheet(S.editJobId); break;
    case 'toggleleadsection':
      S.leadSectionLayout={
        order:[...(S.leadSectionLayout?.order || DEFAULT_LEAD_SECTION_LAYOUT.order)],
        collapsed:{...DEFAULT_LEAD_SECTION_LAYOUT.collapsed,...(S.leadSectionLayout?.collapsed||{}),[el.dataset.section]:!(S.leadSectionLayout?.collapsed?.[el.dataset.section])}
      };
      saveLeadSectionLayout();
      render();
      break;
    case 'searchleads':
      S.leadsSector=document.getElementById('leadSector')?.value||S.leadsSector;
      S.leadsRegion=document.getElementById('leadRegion')?.value||S.leadsRegion;
      searchLeads(); break;
    case 'leadchip':
      S.leadsSector=el.dataset.sector; render(); break;
    case 'fitleadregion':
      S.leadsRegion=document.getElementById('leadRegion')?.value||S.leadsRegion;
      if(leadMap){ const r=LEAD_REGIONS[S.leadsRegion]||LEAD_REGIONS['north-east']; leadMap.setView(r.center,8); }
      break;
    case 'resetleadmap':
      S.leadMapLayout={...DEFAULT_LEAD_MAP_LAYOUT};
      applyLeadMapLayout(true);
      break;
    case 'addemailtemplate':
      createLeadEmailTemplate({name:'New outreach template',subject:'',body:''});
      break;
    case 'saveemailtemplate':
      saveLeadEmailTemplateFromForm();
      break;
    case 'duplicateemailtemplate':
      duplicateLeadEmailTemplate();
      break;
    case 'deleteemailtemplate':
      deleteActiveLeadEmailTemplate();
      break;
    case 'restoreemailtemplates':
      restoreDefaultLeadEmailTemplates();
      break;
    case 'createemailidea':
      createLeadEmailIdea(Number(el.dataset.idea));
      break;
    case 'insertemailtoken':
      insertLeadEmailToken(el.dataset.token||'');
      break;
    case 'clearleademailtarget':
      S.leadEmailTargetType=null;
      S.leadEmailTargetId=null;
      render();
      break;
    case 'savelead': saveLeadFromResult(Number(el.dataset.index)); break;
    case 'leadtocustomer': convertLeadToCustomer(el.dataset.lid); break;
    case 'viewleadcustomer': {
  const customer = DB.getCustomer(el.dataset.cid);
  if(!customer){
    alert('Linked customer not found for this lead.');
    break;
  }
  S.view = 'customers';
  S.editCustId = customer.id;
  S.custModal = true;
  render();
  break;
}
    case 'deletelead': if(confirm('Delete this saved lead?')){ DB.deleteLead(el.dataset.lid); render(); } break;
    case 'openleademail':
      selectLeadForEmailStudio('result', Number(el.dataset.index));
      break;
    case 'opensavedemail':
      selectLeadForEmailStudio('saved', el.dataset.lid);
      break;
    case 'closeleademail': S.leadEmailIdx=null; S.leadEmailSavedId=null; render(); setTimeout(initLeadsMap,40); break;
    case 'sendgmailemail': {
      const r=S.leadEmailSavedId ? DB.leads.find(l=>l.id===S.leadEmailSavedId) : S.leadResults[S.leadEmailIdx];
      if(r){
        const to=leadEmailAddress(r);
        if(!to){ alert('No email address found for this lead or linked customer.'); break; }
        const tpl=activeLeadEmailTemplate();
        sendViaGmail(to,personalizeLeadEmail(tpl?.subject||'',r),personalizeLeadEmail(tpl?.body||'',r)).then(ok=>{ if(ok){ S.leadEmailIdx=null; S.leadEmailSavedId=null; render(); setTimeout(initLeadsMap,40); alert('Email sent!'); } });
      }
      break;
    }
    case 'sendgmailstudio': {
      const lead=selectedLeadForEmailStudio();
      if(!lead){ alert('Select a lead first.'); break; }
      const to=leadEmailAddress(lead);
      if(!to){ alert('No email address found for this lead or linked customer.'); break; }
      const tpl=activeLeadEmailTemplate();
      sendViaGmail(to,personalizeLeadEmail(tpl?.subject||'',lead),personalizeLeadEmail(tpl?.body||'',lead)).then(ok=>{ if(ok) alert('Email sent to '+lead.name+'!'); });
      break;
    }
    case 'openassetfromcustomer':
      S.custModal=false;
      S.assetModal=true;
      S.view='assets';
      S.editAssetId=el.dataset.aid;
      render();
      break;
    case 'selectemailtemplate': S.leadEmailTemplate=Number(el.dataset.tidx); render(); setTimeout(initLeadsMap,40); break;
  }
});
document.addEventListener('change',e=>{
  if(e.target.id==='f-cust'){
    const cust=DB.getCustomer(e.target.value);
    const loc=document.getElementById('f-loc');
    if(loc && cust?.address && !loc.value) loc.value=cust.address;
    const assetSel=document.getElementById('f-assets');
    if(assetSel){
      const selected=[...assetSel.selectedOptions].map(o=>o.value);
      const assets=(cust?assetsForCustomer(cust.id):DB.assets);
      assetSel.innerHTML=assets.map(a=>`<option value="${a.id}" ${selected.includes(a.id)?'selected':''}>${esc(a.name || a.makeModel || 'Asset')} ${a.serial?`· ${esc(a.serial)}`:''}</option>`).join('');
    }
  }
  if(e.target.id==='schedMode'){ S.scheduleMode=e.target.value; render(); }
  if(e.target.id==='schedDate'){ S.scheduleDate=e.target.value; render(); }
  if(e.target.id==='leadSortSel'){ S.leadSort=e.target.value; render(); setTimeout(initLeadsMap,40); }
});
document.addEventListener('input',e=>{
  if(e.target.dataset.a==='searchcust'){ S.search=e.target.value; clearTimeout(window._st); window._st=setTimeout(render,100); }
  if(e.target.dataset.a==='searchasset'){ S.assetSearch=e.target.value; clearTimeout(window._st2); window._st2=setTimeout(render,100); }
  if(e.target.dataset.a==='contactsearch'){ S.contactSearch=e.target.value; clearTimeout(window._st3); window._st3=setTimeout(render,100); }
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(S.jobModal||S.custModal||S.assetModal) closeModal();
    else if(S.selDate) { S.selDate=null; render(); }
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){
    if(S.jobModal) saveJob();
    if(S.custModal) saveCust();
    if(S.assetModal) saveAsset();
    if(['leadEmailName','leadEmailSubject','leadEmailBody'].includes(document.activeElement?.id||'')) saveLeadEmailTemplateFromForm();
  }
});
window.addEventListener('pointermove',updateLeadMapPointer);
window.addEventListener('pointerup',stopLeadMapPointer);
window.addEventListener('pointercancel',stopLeadMapPointer);
window.addEventListener('resize',()=>{
  clearTimeout(window._leadMapLayoutResize);
  window._leadMapLayoutResize=setTimeout(()=>{
    if(S.view==='leads') applyLeadMapLayout(false);
  },60);
});

function bindDrag(){
  let dragId=null;
  document.querySelectorAll('[data-drag-job]').forEach(card=>{
    card.addEventListener('dragstart',()=>{
      dragId=card.dataset.dragJob;
      card.classList.add('dragging');
    });
    card.addEventListener('dragend',()=>{ card.classList.remove('dragging'); });
  });
  document.querySelectorAll('[data-drop]').forEach(zone=>{
    zone.addEventListener('dragover',e=>{ e.preventDefault(); });
    zone.addEventListener('drop',e=>{
      e.preventDefault();
      if(!dragId) return;
      DB.updateJob(dragId,{status:zone.dataset.drop});
      dragId=null;
      render();
    });
  });
}

DB.load();
if(!DB.leadEmailTemplates.length) DB.leadEmailTemplates=normalizeLeadEmailTemplates([]);
render();
</script>
